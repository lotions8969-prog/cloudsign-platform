steps:
  # --- Step 1: フロントエンド依存関係インストール & ビルドテスト ---
  - name: "node:20-slim"
    id: "frontend-install"
    dir: "frontend"
    entrypoint: "npm"
    args: ["ci"]

  - name: "node:20-slim"
    id: "frontend-lint"
    dir: "frontend"
    entrypoint: "npm"
    args: ["run", "lint"]
    waitFor: ["frontend-install"]

  - name: "node:20-slim"
    id: "frontend-typecheck"
    dir: "frontend"
    entrypoint: "npm"
    args: ["run", "type-check"]
    waitFor: ["frontend-install"]

  # --- Step 2: Cloud Functions 依存関係インストール & ビルド ---
  - name: "node:20-slim"
    id: "functions-install"
    dir: "functions"
    entrypoint: "npm"
    args: ["ci"]

  - name: "node:20-slim"
    id: "functions-build"
    dir: "functions"
    entrypoint: "npm"
    args: ["run", "build"]
    waitFor: ["functions-install"]

  # --- Step 3: Artifact Registry への Docker イメージ push ---
  - name: "gcr.io/cloud-builders/docker"
    id: "docker-build"
    args:
      - "build"
      - "-t"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloudsign/frontend:$COMMIT_SHA"
      - "-t"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloudsign/frontend:latest"
      - "frontend"
    waitFor: ["frontend-lint", "frontend-typecheck"]

  - name: "gcr.io/cloud-builders/docker"
    id: "docker-push"
    args:
      - "push"
      - "--all-tags"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloudsign/frontend"
    waitFor: ["docker-build"]

  # --- Step 4: Cloud Run デプロイ ---
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "cloudrun-deploy"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "cloudsign-frontend"
      - "--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloudsign/frontend:$COMMIT_SHA"
      - "--region=asia-northeast1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--max-instances=10"
      - "--set-env-vars=NODE_ENV=production"
      - "--service-account=cloudsign-frontend@$PROJECT_ID.iam.gserviceaccount.com"
    waitFor: ["docker-push"]

  # --- Step 5: Cloud Functions デプロイ ---
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "functions-deploy-onEnvelopeCreated"
    entrypoint: "gcloud"
    args:
      - "functions"
      - "deploy"
      - "onEnvelopeCreated"
      - "--gen2"
      - "--runtime=nodejs20"
      - "--region=asia-northeast1"
      - "--source=functions"
      - "--entry-point=onEnvelopeCreated"
      - "--trigger-event-filters=type=google.cloud.firestore.document.v1.created"
      - "--trigger-event-filters=database=(default)"
      - "--trigger-event-filters-path-pattern=document=envelopes/{envelopeId}"
      - "--service-account=cloudsign-functions@$PROJECT_ID.iam.gserviceaccount.com"
      - "--memory=256Mi"
    waitFor: ["functions-build"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "functions-deploy-onSignatureCompleted"
    entrypoint: "gcloud"
    args:
      - "functions"
      - "deploy"
      - "onSignatureCompleted"
      - "--gen2"
      - "--runtime=nodejs20"
      - "--region=asia-northeast1"
      - "--source=functions"
      - "--entry-point=onSignatureCompleted"
      - "--trigger-event-filters=type=google.cloud.firestore.document.v1.updated"
      - "--trigger-event-filters=database=(default)"
      - "--trigger-event-filters-path-pattern=document=envelopes/{envelopeId}"
      - "--service-account=cloudsign-functions@$PROJECT_ID.iam.gserviceaccount.com"
      - "--memory=512Mi"
    waitFor: ["functions-build"]

substitutions:
  _REGION: asia-northeast1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: "E2_HIGHCPU_8"
  dynamicSubstitutions: true

timeout: "1800s"

images:
  - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloudsign/frontend:$COMMIT_SHA"
  - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloudsign/frontend:latest"
